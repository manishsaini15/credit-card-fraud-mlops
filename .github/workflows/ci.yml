name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from src.components.data_ingestion import DataIngestion"
          python -c "from src.components.data_validation import DataValidation"
          python -c "from src.components.data_transformation import DataTransformation"
          python -c "from src.components.model_trainer import ModelTrainer"

      - name: Verify FastAPI app
        run: |
          python -c "import app"